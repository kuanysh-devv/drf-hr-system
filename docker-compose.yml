services:
  web:
    build: .
    command: gunicorn SPDV2.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      createbucket:
        condition: service_completed_successfully
    restart: unless-stopped

  celery:
    build: .
    command: celery -A SPDV2 worker --loglevel=info
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A SPDV2 beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env.docker
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  createbucket:
    image: minio/mc:latest
    env_file:
      - .env.docker
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/$$MINIO_BUCKET_NAME;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_volume:
  media_volume:
